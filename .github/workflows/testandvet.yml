name: Test and Vet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - release-v2.*.*
  release:
    types:
      - published
      - created
      - edited

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: 1.25.8

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Cache Go module and build cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        key: go-${{ hashFiles('**/go.sum') }}
        path: |
          ~/go/pkg/mod
        restore-keys: |
          go-

    - name: Install aqua
      uses: aquaproj/aqua-installer@e2d0136abcf70b7a2f93480c8c7bfe0152caee6b # v4.0.0
      with:
        aqua_version: v2.55.1

    - name: Test and vet
      working-directory: v2
      run: |
        task vet
        task tennvet
        task test
